<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Архитектор каталога услуг — Бизнес-игра</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-dark:#0a0e17;--bg-card:#141b2d;--bg-panel:#1a2236;--bg-hover:#22304a;
  --text-primary:#e8e8e8;--text-secondary:#9aa6b8;--text-muted:#6b7689;
  --accent:#00d9a5;--accent-2:#3498db;--accent-3:#9b59b6;
  --success:#2ecc71;--warning:#f39c12;--danger:#e74c3c;--gold:#ffd700;
  --border:#2a3551;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(0,217,165,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(155,89,182,.08) 0%,transparent 50%);
  color:var(--text-primary);min-height:100vh;line-height:1.5;
}
.container{max-width:1300px;margin:0 auto;padding:20px}

/* Header */
header{text-align:center;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
h1{
  font-family:'Russo One',sans-serif;font-size:2.2rem;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2),var(--accent-3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{color:var(--text-secondary);margin-top:5px;font-size:1rem}

/* Stats dashboard */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;
  margin:20px 0;padding:15px;background:var(--bg-card);border-radius:14px;border:1px solid var(--border);
}
.stat{text-align:center;padding:10px;background:var(--bg-panel);border-radius:10px;position:relative;overflow:hidden}
.stat-value{font-family:'Russo One',sans-serif;font-size:1.5rem;display:block}
.stat-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.stat-bar{height:4px;background:var(--bg-dark);border-radius:2px;margin-top:6px;overflow:hidden}
.stat-fill{height:100%;transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:2px}
.s-score{color:var(--gold)}.f-score{background:var(--gold)}
.s-csat{color:var(--accent-2)}.f-csat{background:var(--accent-2)}
.s-budget{color:var(--success)}.f-budget{background:var(--success)}
.s-quality{color:var(--accent)}.f-quality{background:var(--accent)}

/* Mission progress */
.mission-track{display:flex;justify-content:space-between;margin:20px 0;gap:8px;flex-wrap:wrap}
.mission-step{
  flex:1;min-width:130px;padding:10px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;text-align:center;font-size:.8rem;color:var(--text-muted);transition:all .3s;
}
.mission-step.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(0,217,165,.15)}
.mission-step.done{border-color:var(--success);color:var(--success);background:rgba(46,204,113,.05)}
.mission-step .num{font-family:'Russo One',sans-serif;font-size:1.3rem;display:block}

/* Mission Card */
.mission-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:25px;margin-bottom:20px;
  animation:slideIn .4s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.mission-header{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;margin-bottom:12px;flex-wrap:wrap}
.mission-title{font-family:'Russo One',sans-serif;font-size:1.4rem;color:var(--accent)}
.mission-tag{
  background:rgba(0,217,165,.15);color:var(--accent);padding:4px 12px;border-radius:20px;
  font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;
}
.mission-brief{color:var(--text-secondary);font-size:.95rem;margin-bottom:12px;line-height:1.7}
.story-box{
  background:rgba(52,152,219,.08);border-left:3px solid var(--accent-2);padding:12px 15px;
  border-radius:8px;margin:15px 0;font-size:.9rem;color:var(--text-secondary);font-style:italic;
}

/* Generic question */
.question{font-size:1.05rem;color:var(--text-primary);margin:15px 0 12px;font-weight:600}

/* Drag classify */
.classify-pool{
  display:flex;flex-wrap:wrap;gap:10px;padding:15px;background:var(--bg-panel);
  border-radius:10px;min-height:60px;margin-bottom:15px;
}
.chip{
  padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
  cursor:grab;font-size:.85rem;user-select:none;transition:all .2s;
}
.chip:hover{border-color:var(--accent);transform:translateY(-2px)}
.chip.dragging{opacity:.4}
.chip.placed{cursor:default;opacity:.85}
.chip.correct{border-color:var(--success);background:rgba(46,204,113,.12)}
.chip.wrong{border-color:var(--danger);background:rgba(231,76,60,.12)}
.bins{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.bin{
  background:var(--bg-panel);border:2px dashed var(--border);border-radius:12px;padding:15px;
  min-height:120px;transition:all .2s;
}
.bin.over{border-color:var(--accent);background:rgba(0,217,165,.05)}
.bin-title{font-weight:600;font-size:.9rem;margin-bottom:8px;color:var(--accent-2)}
.bin-hint{font-size:.75rem;color:var(--text-muted);margin-bottom:10px}
.bin-items{display:flex;flex-wrap:wrap;gap:8px;min-height:40px}

/* Multiple choice */
.options{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option{
  padding:14px 18px;background:var(--bg-panel);border:2px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .2s;font-size:.95rem;
}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--bg-hover)}
.option.selected{border-color:var(--accent);background:rgba(0,217,165,.08)}
.option.correct{border-color:var(--success);background:rgba(46,204,113,.12)}
.option.wrong{border-color:var(--danger);background:rgba(231,76,60,.12)}
.option.disabled{cursor:not-allowed;opacity:.85}
.option-meta{font-size:.78rem;color:var(--text-muted);margin-top:4px}

/* Match grid */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.match-row{display:contents}
.match-label{
  padding:12px;background:var(--bg-panel);border-radius:8px;font-size:.9rem;
  display:flex;align-items:center;border:1px solid var(--border);
}
.match-select{
  padding:12px;background:var(--bg-card);border:2px solid var(--border);border-radius:8px;
  color:var(--text-primary);font-family:inherit;font-size:.9rem;width:100%;cursor:pointer;
}
.match-select:focus{outline:none;border-color:var(--accent)}
.match-select.correct{border-color:var(--success);background:rgba(46,204,113,.08)}
.match-select.wrong{border-color:var(--danger);background:rgba(231,76,60,.08)}

/* SLA configurator */
.sla-row{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;align-items:center;
  padding:10px;background:var(--bg-panel);border-radius:8px;margin-bottom:8px;
}
.sla-name{font-size:.9rem;font-weight:600}
.sla-row select{
  padding:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
  color:var(--text-primary);font-family:inherit;font-size:.85rem;
}
.sla-row select:focus{outline:none;border-color:var(--accent)}
.sla-row.scored.good{box-shadow:inset 3px 0 0 var(--success)}
.sla-row.scored.ok{box-shadow:inset 3px 0 0 var(--warning)}
.sla-row.scored.bad{box-shadow:inset 3px 0 0 var(--danger)}
.sla-header{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:600}

/* Workflow design */
.workflow-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.workflow-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.workflow-card h4{font-size:.95rem;color:var(--accent-2);margin-bottom:6px}
.workflow-card p{font-size:.82rem;color:var(--text-muted);margin-bottom:10px}
.workflow-card label{display:block;font-size:.75rem;color:var(--text-muted);margin-top:8px;margin-bottom:3px}
.workflow-card select{
  width:100%;padding:8px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:6px;color:var(--text-primary);font-family:inherit;font-size:.85rem;
}
.workflow-card select:focus{outline:none;border-color:var(--accent)}
.workflow-card.scored{border-color:var(--success)}
.workflow-card.scored.partial{border-color:var(--warning)}
.workflow-card.scored.bad{border-color:var(--danger)}

/* Crisis events */
.event-card{
  background:var(--bg-panel);border-left:3px solid var(--warning);border-radius:10px;
  padding:14px;margin-bottom:12px;animation:slideIn .3s;
}
.event-card.urgent{border-left-color:var(--danger)}
.event-card.info{border-left-color:var(--accent-2)}
.event-time{font-size:.75rem;color:var(--text-muted);font-family:'Russo One',sans-serif}
.event-text{font-size:.95rem;margin:5px 0 10px}
.event-actions{display:flex;flex-wrap:wrap;gap:8px}
.event-action{
  padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
  cursor:pointer;font-size:.82rem;transition:all .2s;font-family:inherit;color:var(--text-primary);
}
.event-action:hover:not(:disabled){border-color:var(--accent);background:var(--bg-hover)}
.event-action:disabled{opacity:.5;cursor:not-allowed}
.event-action.picked{border-color:var(--accent);background:rgba(0,217,165,.1)}

/* Buttons */
.actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.btn{
  padding:12px 26px;border-radius:10px;border:none;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0e17}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,217,165,.25)}
.btn-primary:disabled{background:var(--bg-panel);color:var(--text-muted);cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--bg-panel);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}

/* Feedback */
.feedback{margin-top:18px;padding:15px 18px;border-radius:10px;display:none}
.feedback.show{display:block;animation:slideIn .3s}
.feedback.good{background:rgba(46,204,113,.08);border:1px solid var(--success)}
.feedback.partial{background:rgba(243,156,18,.08);border:1px solid var(--warning)}
.feedback.bad{background:rgba(231,76,60,.08);border:1px solid var(--danger)}
.feedback-title{font-family:'Russo One',sans-serif;font-size:1.05rem;margin-bottom:6px}
.feedback.good .feedback-title{color:var(--success)}
.feedback.partial .feedback-title{color:var(--warning)}
.feedback.bad .feedback-title{color:var(--danger)}
.feedback p{font-size:.9rem;color:var(--text-secondary);line-height:1.7}
.feedback ul{margin-top:8px;padding-left:20px;font-size:.85rem;color:var(--text-secondary)}
.feedback li{margin-bottom:4px}

/* Final screen */
.final{text-align:center;padding:40px 20px}
.final-rank{
  font-family:'Russo One',sans-serif;font-size:3rem;letter-spacing:3px;margin:20px 0;
  background:linear-gradient(135deg,var(--gold),var(--warning));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.final-summary{max-width:700px;margin:0 auto;color:var(--text-secondary);font-size:1rem;line-height:1.8}
.final-stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;
  max-width:800px;margin:30px auto;
}
.final-stat{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.final-stat-val{font-family:'Russo One',sans-serif;font-size:2rem;color:var(--accent)}
.final-stat-label{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.lessons{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin:25px auto;max-width:800px;text-align:left;
}
.lessons h3{color:var(--accent);margin-bottom:12px;font-family:'Russo One',sans-serif}
.lessons li{margin-bottom:8px;color:var(--text-secondary);font-size:.9rem}

@media(max-width:700px){
  .sla-row{grid-template-columns:1fr;gap:6px}
  .sla-row select{width:100%}
  h1{font-size:1.6rem}
  .stat-value{font-size:1.2rem}
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>Архитектор каталога услуг</h1>
  <div class="subtitle">Бизнес-игра по практике Service Catalogue Management • ITIL 4</div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-value s-score" id="sScore">0</span>
    <div class="stat-label">Очки</div>
    <div class="stat-bar"><div class="stat-fill f-score" id="fScore" style="width:0%"></div></div>
  </div>
  <div class="stat">
    <span class="stat-value s-csat" id="sCsat">50%</span>
    <div class="stat-label">CSAT — довольство</div>
    <div class="stat-bar"><div class="stat-fill f-csat" id="fCsat" style="width:50%"></div></div>
  </div>
  <div class="stat">
    <span class="stat-value s-budget" id="sBudget">100k₽</span>
    <div class="stat-label">Бюджет</div>
    <div class="stat-bar"><div class="stat-fill f-budget" id="fBudget" style="width:100%"></div></div>
  </div>
  <div class="stat">
    <span class="stat-value s-quality" id="sQuality">0%</span>
    <div class="stat-label">Качество каталога</div>
    <div class="stat-bar"><div class="stat-fill f-quality" id="fQuality" style="width:0%"></div></div>
  </div>
</div>

<div class="mission-track" id="track"></div>

<div id="missionArea"></div>

</div>

<script>
// ============ GAME STATE ============
const state = {
  current: 0,
  score: 0,
  csat: 50,
  budget: 100,    // тысяч рублей
  quality: 0,     // %
  log: []
};

const missions = [
  { id:'audit',     title:'Аудит ландшафта',         icon:'1', tag:'Mission 1' },
  { id:'define',    title:'Описание услуг',          icon:'2', tag:'Mission 2' },
  { id:'structure', title:'Структура каталога',      icon:'3', tag:'Mission 3' },
  { id:'sla',       title:'Уровни обслуживания',     icon:'4', tag:'Mission 4' },
  { id:'workflow',  title:'Запросы и одобрения',     icon:'5', tag:'Mission 5' },
  { id:'crisis',    title:'День Х: жизненный цикл',  icon:'6', tag:'Mission 6' }
];

// ============ HELPERS ============
function $(id){return document.getElementById(id)}
function clamp(n,a,b){return Math.max(a,Math.min(b,n))}

function updateStats(){
  $('sScore').textContent = state.score;
  $('sCsat').textContent  = Math.round(state.csat) + '%';
  $('sBudget').textContent= state.budget + 'k₽';
  $('sQuality').textContent= Math.round(state.quality) + '%';
  $('fScore').style.width = clamp(state.score/3,0,100) + '%';
  $('fCsat').style.width  = clamp(state.csat,0,100) + '%';
  $('fBudget').style.width= clamp(state.budget,0,100) + '%';
  $('fQuality').style.width= clamp(state.quality,0,100) + '%';
  // colors
  const csatEl=$('sCsat'); csatEl.style.color = state.csat<40?'var(--danger)':state.csat<60?'var(--warning)':'var(--accent-2)';
  const budgEl=$('sBudget'); budgEl.style.color= state.budget<30?'var(--danger)':state.budget<60?'var(--warning)':'var(--success)';
}

function applyDelta(d){
  state.score   += d.score   || 0;
  state.csat    = clamp(state.csat   + (d.csat||0),    0, 100);
  state.budget  = clamp(state.budget + (d.budget||0),  0, 200);
  state.quality = clamp(state.quality+ (d.quality||0), 0, 100);
  updateStats();
}

function renderTrack(){
  $('track').innerHTML = missions.map((m,i)=>{
    const cls = i<state.current?'done':i===state.current?'active':'';
    return `<div class="mission-step ${cls}"><span class="num">${m.icon}</span>${m.title}</div>`;
  }).join('');
}

function next(){
  state.current++;
  renderTrack();
  if(state.current>=missions.length) renderFinal();
  else renderMission();
}

function renderMission(){
  const m = missions[state.current];
  if(m.id==='audit')     renderAudit();
  else if(m.id==='define') renderDefine();
  else if(m.id==='structure') renderStructure();
  else if(m.id==='sla')    renderSLA();
  else if(m.id==='workflow') renderWorkflow();
  else if(m.id==='crisis') renderCrisis();
}

// ============ MISSION 1: AUDIT ============
// Drag items into bins: real service / IT-component / internal-process / not-a-service
const auditItems = [
  {id:'a1', text:'Email для сотрудников',                bin:'service'},
  {id:'a2', text:'Доступ к CRM-системе',                  bin:'service'},
  {id:'a3', text:'Процессорное время сервера app-12',     bin:'component'},
  {id:'a4', text:'База знаний Confluence',                bin:'service'},
  {id:'a5', text:'Замена картриджа в принтере',           bin:'process'},
  {id:'a6', text:'IP-адрес 10.0.0.5',                     bin:'component'},
  {id:'a7', text:'Видеоконференц-связь',                  bin:'service'},
  {id:'a8', text:'Оформление кофе-машины',                bin:'notservice'},
  {id:'a9', text:'Резервное копирование БД',              bin:'process'},
  {id:'a10',text:'Лицензия на Figma',                     bin:'service'},
  {id:'a11',text:'Маршрутизатор Cisco-37',                bin:'component'},
  {id:'a12',text:'Подбор персонала через HR',             bin:'notservice'}
];
const auditBins = [
  {id:'service',   title:'🟢 Бизнес-услуга',     hint:'Выходной результат для пользователя/бизнеса'},
  {id:'component', title:'🔧 IT-компонент / CI', hint:'Конфигурационная единица, не услуга'},
  {id:'process',   title:'⚙️ Внутренний процесс',hint:'Действие IT, не запрашиваемое из каталога'},
  {id:'notservice',title:'❌ Не относится к ИТ', hint:'Это вообще не предмет IT-каталога'}
];
let auditPlaced = {};

function renderAudit(){
  $('missionArea').innerHTML = `
    <div class="mission-card">
      <div class="mission-header">
        <div>
          <div class="mission-tag">Миссия 1 • Audit</div>
          <h2 class="mission-title">Аудит ландшафта услуг</h2>
        </div>
      </div>
      <div class="story-box">
        💼 Вы вошли в TechCloud Inc как новый Service Catalog Manager. Никакого каталога нет — есть свалка тикетов и расплывчатый список «всё, что мы делаем». Первый шаг — отделить настоящие услуги от компонентов и фоновых процессов.
      </div>
      <p class="mission-brief">Перетащите каждый пункт в правильную корзину. Услуга — это <b>результат для бизнеса/пользователя</b>, который можно описать SLA и заказать. Компоненты и процессы в каталог услуг не выносят.</p>
      <div class="question">Перетащите все 12 пунктов:</div>
      <div class="classify-pool" id="pool"></div>
      <div class="bins" id="bins"></div>
      <div class="actions">
        <button class="btn btn-primary" id="checkAudit" disabled>Проверить классификацию</button>
        <button class="btn btn-ghost" id="resetAudit">Сбросить</button>
      </div>
      <div class="feedback" id="auditFb"></div>
    </div>`;

  auditPlaced = {};
  const pool = $('pool');
  pool.innerHTML = auditItems.map(it=>`<div class="chip" draggable="true" data-id="${it.id}">${it.text}</div>`).join('');

  $('bins').innerHTML = auditBins.map(b=>`
    <div class="bin" data-bin="${b.id}">
      <div class="bin-title">${b.title}</div>
      <div class="bin-hint">${b.hint}</div>
      <div class="bin-items" data-bin-items="${b.id}"></div>
    </div>`).join('');

  // drag handlers
  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('dragstart',e=>{e.dataTransfer.setData('text',c.dataset.id);c.classList.add('dragging')});
    c.addEventListener('dragend',()=>c.classList.remove('dragging'));
  });
  document.querySelectorAll('.bin').forEach(bin=>{
    bin.addEventListener('dragover',e=>{e.preventDefault();bin.classList.add('over')});
    bin.addEventListener('dragleave',()=>bin.classList.remove('over'));
    bin.addEventListener('drop',e=>{
      e.preventDefault();bin.classList.remove('over');
      const id = e.dataTransfer.getData('text');
      const chip = document.querySelector(`.chip[data-id="${id}"]`);
      if(!chip) return;
      auditPlaced[id] = bin.dataset.bin;
      chip.classList.add('placed');
      bin.querySelector('.bin-items').appendChild(chip);
      checkAuditReady();
    });
  });

  $('checkAudit').onclick = checkAudit;

let wfPicks = {};

function renderWorkflow(){
  $('missionArea').innerHTML=`
    <div class="mission-card">
      <div class="mission-header">
        <div>
          <div class="mission-tag">Миссия 5 • Request Fulfillment</div>
          <h2 class="mission-title">Запросы и одобрения</h2>
        </div>
      </div>
      <div class="story-box">
        Каталог жив, когда есть рабочие процессы за каждой кнопкой. Спроектируйте: для каких запросов нужно одобрение, кто их исполняет. Слишком жёсткий процесс — пользователь устанет, слишком мягкий — провал безопасности.
      </div>
      <p class="mission-brief">Для каждого типа запроса выберите путь одобрения и исполнителя. Принцип: <b>оптимизировать массовое, контролировать рискованное</b>.</p>
      <div class="workflow-grid">
        ${wfRequests.map(r=>`
          <div class="workflow-card" data-id="${r.id}">
            <h4>${r.title}</h4>
            <p>${r.desc}</p>
            <label>Одобрение</label>
            <select data-r="${r.id}" data-f="approval">
              <option value="">—</option>
              ${r.options.approval.map(o=>`<option value="${o.v}">${o.t}</option>`).join('')}
            </select>
            <label>Исполнитель</label>
            <select data-r="${r.id}" data-f="assign">
              <option value="">—</option>
              ${r.options.assign.map(o=>`<option value="${o.v}">${o.t}</option>`).join('')}
            </select>
          </div>`).join('')}
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="checkWF" disabled>Запустить процессы</button>
      </div>
      <div class="feedback" id="wfFb"></div>
    </div>`;

  wfPicks={};
  document.querySelectorAll('select[data-r]').forEach(sel=>{
    sel.onchange=()=>{
      wfPicks[sel.dataset.r] = wfPicks[sel.dataset.r] || {};
      wfPicks[sel.dataset.r][sel.dataset.f] = sel.value;
      const ready = wfRequests.every(r=>wfPicks[r.id] && wfPicks[r.id].approval && wfPicks[r.id].assign);
      $('checkWF').disabled = !ready;
    };
  });

  $('checkWF').onclick=()=>{
    let goodCnt=0, partial=0;
    wfRequests.forEach(r=>{
      const card=$('missionArea').querySelector(`.workflow-card[data-id="${r.id}"]`);
      const pick=wfPicks[r.id];
      const aGood = r.options.approval.find(o=>o.v===pick.approval).good;
      const sGood = r.options.assign.find(o=>o.v===pick.assign).good;
      if(aGood && sGood){card.classList.add('scored');goodCnt++}
      else if(aGood || sGood){card.classList.add('scored','partial');partial++}
      else card.classList.add('scored','bad');
    });
    document.querySelectorAll('select[data-r]').forEach(s=>s.disabled=true);
    $('checkWF').disabled=true;

    const total = wfRequests.length;
    const score = goodCnt*30 + partial*10;
    const csat = (goodCnt-partial)*5;
    const quality = Math.round((goodCnt+partial*0.5)/total * 20);
    applyDelta({score, csat, quality, budget:goodCnt*2});

    const fb=$('wfFb');
    const cls = goodCnt===total ? 'good' : goodCnt>=2 ? 'partial' : 'bad';
    fb.className='feedback show '+cls;
    fb.innerHTML=`
      <div class="feedback-title">${goodCnt===total?'✅ Идеально':goodCnt>=2?'⚠️ Местами громоздко':'❌ Процессы перекошены'}: ${goodCnt}/${total} полностью верно</div>
      <p>Главное правило: <b>уровень контроля = уровню риска</b>. Сброс пароля — автоматизировать (это 30% всех тикетов!). Доступ к финансам — только через владельца данных. Ноутбук — финотдел. Рассылка — авто.</p>
      <ul>
        <li>Каждое лишнее одобрение — это +24 часа задержки и -10% к CSAT</li>
        <li>Self-service закрывает 50-70% типовых запросов почти бесплатно</li>
        <li>Для рискованных запросов одобрений ровно столько, сколько требует регуляция и не более</li>
      </ul>`;
    fb.insertAdjacentHTML('beforeend','<div class="actions"><button class="btn btn-primary" id="contNext">Дальше →</button></div>');
    $('contNext').onclick = next;
  };
}

let crisisIdx=0, crisisGood=0, crisisPartial=0;

function renderCrisis(){
  crisisIdx=0;crisisGood=0;crisisPartial=0;
  $('missionArea').innerHTML=`
    <div class="mission-card">
      <div class="mission-header">
        <div>
          <div class="mission-tag">Миссия 6 • Lifecycle Day</div>
          <h2 class="mission-title">День Х: жизненный цикл услуг</h2>
        </div>
      </div>
      <div class="story-box">
        Каталог построен, но он не статичен. За один день в инбоксе — пять событий, каждое требует решения по жизненному циклу: добавить, обновить, вывести, улучшить или передать.
      </div>
      <p class="mission-brief">Реагируйте на события. Это финальная миссия — здесь проверяется зрелость управления каталогом.</p>
      <div id="crisisFeed"></div>
      <div class="feedback" id="crisisFb"></div>
    </div>`;
  showCrisisEvent();
}

function showCrisisEvent(){
  const ev = crisisEvents[crisisIdx];
  const card = document.createElement('div');
  card.className = 'event-card '+(ev.tone||'');
  card.id = 'ev_'+ev.id;
  card.innerHTML = `
    <div class="event-time">⏱ ${ev.time}</div>
    <div class="event-text">${ev.text}</div>
    <div class="event-actions">
      ${ev.actions.map((a,i)=>`<button class="event-action" data-i="${i}">${a.t}</button>`).join('')}
    </div>
    <div class="ev-feedback" style="margin-top:10px;font-size:.85rem;display:none"></div>`;
  $('crisisFeed').appendChild(card);

  card.querySelectorAll('.event-action').forEach(b=>{
    b.onclick = ()=>{
      const i = +b.dataset.i;
      const a = ev.actions[i];
      card.querySelectorAll('.event-action').forEach(x=>x.disabled=true);
      b.classList.add('picked');
      const fbBox = card.querySelector('.ev-feedback');
      fbBox.style.display='block';
      fbBox.innerHTML = `<span style="color:${a.good?'var(--success)':'var(--danger)'};font-weight:600">${a.good?'✅ Верно':'❌ Не оптимально'}</span> — ${a.why}`;
      if(a.good) crisisGood++;
      crisisIdx++;
      if(crisisIdx<crisisEvents.length){
        setTimeout(showCrisisEvent, 700);
      } else {
        setTimeout(finishCrisis, 700);
      }
    };
  });
}

function finishCrisis(){
  const total = crisisEvents.length;
  const pct = crisisGood/total;
  applyDelta({
    score: Math.round(pct*150),
    csat: Math.round((pct-.4)*30),
    quality: Math.round(pct*20),
    budget: pct>=.8?15:0
  });
  const fb = $('crisisFb');
  const cls = pct>=.8?'good':pct>=.6?'partial':'bad';
  fb.className='feedback show '+cls;
  fb.innerHTML=`
    <div class="feedback-title">День завершён: ${crisisGood}/${total} верных решений</div>
    <p>Жизненный цикл услуги — это <b>Plan → Build → Operate → Improve → Retire</b>. Каталог — живой документ. Shadow IT, EOL, CSI и enterprise-портал — повседневные ситуации зрелого Service Catalog Manager.</p>
    <div class="actions"><button class="btn btn-primary" id="contNext">Финал →</button></div>`;
  $('contNext').onclick = next;
}
